# ========================================
# PERFIL DE PRODUCCIÓN - MySQL (AWS RDS)
# La conexión se define por variables de entorno (DB_URL, DB_USERNAME, etc.)
# ========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# Logging reducido para producción (menos verboso)
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.com.sdm.gestion_escolar_backend=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
